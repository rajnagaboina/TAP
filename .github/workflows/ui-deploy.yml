name: Deploy Flutter UI

on:
  push:
    branches: [main]
    paths:
      - "ui/**"
      - ".github/workflows/ui-deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build Flutter Web & Deploy to App Service
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.x"
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: ui
        run: flutter pub get

      - name: Build Flutter Web
        working-directory: ui
        run: |
          flutter build web --release \
            --dart-define=APIM_BASE_URL="${{ vars.APIM_BASE_URL }}" \
            --dart-define=TENANT_ID="${{ vars.TENANT_ID }}" \
            --dart-define=UI_CLIENT_ID="${{ vars.UI_CLIENT_ID }}" \
            --dart-define=API_CLIENT_ID="${{ vars.API_CLIENT_ID }}"

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.UI_APP_SERVICE_NAME }}
          package: ui/build/web
